services:
  app:
    build:
      context: .
    container_name: hris_midland_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "HRIS Midland"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hris_midland
      DB_USERNAME: hris_midland
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "true"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    build:
      context: .
    container_name: hris_midland_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
    environment:
      APP_NAME: "HRIS Midland"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hris_midland
      DB_USERNAME: hris_midland
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "false"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: hris_midland_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: hris_midland
      MYSQL_USER: hris_midland
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app_storage:
  mysql_data:
